<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot ダッシュボード</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.3.1/gridstack.min.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html"><span class="side-ico ico-rec"></span><span class="side-label">レコーディング</span></a>
        <a class="side-item" href="history.html"><span class="side-ico ico-hist"></span><span class="side-label">商談履歴</span></a>
        <a class="side-item" href="deals.html"><span class="side-ico ico-deal"></span><span class="side-label">案件</span></a>
        <a class="side-item" href="report.html"><span class="side-ico ico-ana"></span><span class="side-label">実績</span></a>
        <a class="side-item" href="style-analysis.html"><span class="side-ico ico-ana"></span><span class="side-label">営業スタイル分析</span></a>
        <a class="side-item active" href="dashboard.html"><span class="side-ico ico-ana"></span><span class="side-label">ダッシュボード</span></a>
        <a class="side-item" href="proposals.html"><span class="side-ico ico-deal"></span><span class="side-label">提案資料</span></a>
        <a class="side-item" href="settings.html"><span class="side-ico ico-set"></span><span class="side-label">設定</span></a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>
      <div class="main">
        <header class="topbar">
          <div class="brand"><img class="topbar-bot" src="kinbot.svg" alt="" /><span class="brand-name">ダッシュボード</span></div>
        </header>
        <main class="db-page">
          <div class="db-toolbar">
            <input type="date" id="dbFrom" />
            <span class="db-sep">〜</span>
            <input type="date" id="dbTo" />
            <select id="dbOwner"><option value="">全員</option></select>
            <button class="db-add-btn" id="addWidgetBtn">＋ ウィジェットを追加</button>
          </div>
          <div class="grid-stack" id="dbGrid"></div>
          <div class="db-modal-overlay" id="addModal" hidden>
            <div class="db-modal">
              <div class="db-modal-head"><h3>ウィジェットを追加</h3><button class="db-modal-close" id="closeModal">✕</button></div>
              <div class="db-modal-body" id="widgetCatalog"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="nav.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.3.1/gridstack-all.min.js"></script>
    <script src="dashboard.js" defer></script>
  </body>
</html>
