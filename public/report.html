<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 実績</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html"><span class="side-ico ico-rec"></span><span class="side-label">レコーディング</span></a>
        <a class="side-item" href="history.html"><span class="side-ico ico-hist"></span><span class="side-label">商談履歴</span></a>
        <a class="side-item" href="deals.html"><span class="side-ico ico-deal"></span><span class="side-label">案件</span></a>
        <a class="side-item active" href="report.html"><span class="side-ico ico-ana"></span><span class="side-label">実績</span></a>
        <a class="side-item" href="apo.html"><span class="side-ico ico-apo"></span><span class="side-label">アポ振り分け</span></a>
        <a class="side-item" href="settings.html"><span class="side-ico ico-set"></span><span class="side-label">設定</span></a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><img class="topbar-bot" src="kinbot.svg" alt="" /><span class="brand-name">実績ダッシュボード</span></div></header>
        <main class="report-page">
          <div class="rep-tabs" id="repTabs">
            <button class="rep-tab active" data-rp="funnel">サマリー</button>
            <button class="rep-tab" data-rp="kind">商談種別</button>
            <button class="rep-tab" data-rp="daily">日次データ確認</button>
            <button class="rep-tab" data-rp="pipeline">パイプライン</button>
            <button class="rep-tab" data-rp="interns">インターンアポ</button>
            <button class="rep-tab" data-rp="insights">インサイト</button>
          </div>

          <!-- サマリー（ファネル） -->
          <section class="rep-panel" data-rpanel="funnel">
            <div class="rep-controls">
              <label>期間
                <select id="fnGran">
                  <option value="month">月次</option>
                  <option value="week">週次</option>
                  <option value="day">日次</option>
                </select>
              </label>
              <label>基準日 <input type="date" id="fnBasis" /></label>
              <label>対象
                <select id="fnScope">
                  <option value="all">全体</option>
                  <optgroup label="チーム" id="fnTeamGroup"></optgroup>
                  <optgroup label="担当者" id="fnOwnerGroup"></optgroup>
                </select>
              </label>
              <button class="btn" id="fnApply">更新</button>
            </div>
            <div id="funnelBody"><div class="empty-state">読み込み中…</div></div>
          </section>

          <!-- 商談種別（コールド / 過去失注 / 通常） -->
          <section class="rep-panel" data-rpanel="kind" hidden>
            <div class="rep-controls">
              <label>期間
                <select id="knGran">
                  <option value="month">月次</option>
                  <option value="week">週次</option>
                  <option value="day">日次</option>
                </select>
              </label>
              <label>基準日 <input type="date" id="knBasis" /></label>
              <button class="btn" id="knApply">更新</button>
            </div>
            <div id="kindBody"><div class="empty-state">読み込み中…</div></div>
          </section>

          <!-- 日次データ確認 -->
          <section class="rep-panel" data-rpanel="daily" hidden>
            <div class="rep-controls">
              <label>日付 <input type="date" id="dlDate" /></label>
              <label>担当
                <select id="dlOwner"><option value="">全員</option></select>
              </label>
              <button class="btn" id="dlApply">更新</button>
            </div>
            <div id="dailyBody"><div class="empty-state">読み込み中…</div></div>
          </section>

          <!-- パイプライン -->
          <section class="rep-panel" data-rpanel="pipeline" hidden>
            <div class="rep-controls">
              <label>基準日 <input type="date" id="plDate" /></label>
              <label>対象
                <select id="plOwner"><option value="">全体</option></select>
              </label>
              <button class="btn" id="plApply">更新</button>
            </div>
            <div id="pipelineBody"><div class="empty-state">読み込み中…</div></div>
          </section>

          <!-- インターンアポ -->
          <section class="rep-panel" data-rpanel="interns" hidden>
            <div class="rep-controls">
              <label>期間 <input type="date" id="iaFrom" /></label>
              <label>〜 <input type="date" id="iaTo" /></label>
              <button class="btn ghost" id="iaReload">更新</button>
              <button class="btn" id="iaMatch">カレンダーと照合</button>
              <span class="rev-status" id="iaStatus"></span>
            </div>
            <div id="internBody"><div class="empty-state">読み込み中…</div></div>
          </section>

          <!-- インサイト（勝ち/負けパターン分析） -->
          <section class="rep-panel" data-rpanel="insights" hidden>
            <div class="ins-level-tabs" id="insLevelTabs">
              <button class="ins-level-tab active" data-level="all">全体</button>
              <button class="ins-level-tab" data-level="team">チーム別</button>
              <button class="ins-level-tab" data-level="owner">個人別</button>
            </div>
            <div class="rep-controls">
              <label id="insPickWrap" hidden>対象
                <select id="insPick"></select>
              </label>
              <button class="btn" id="insGenerate">この対象で分析</button>
              <span class="rev-status" id="insStatus"></span>
            </div>
            <div id="insightsBody"><div class="empty-state">「全体」「チーム別」「個人別」から選び、分析を実行すると、再商談に進んだ商談と進まなかった商談を比較します。</div></div>
          </section>
        </main>
      </div>
    </div>
    <!-- 要確認レコードの修正用モーダル -->
    <div class="rev-modal" id="revModal" hidden>
      <div class="rev-box">
        <h3>抽出結果の修正</h3>
        <div id="revForm"></div>
        <div class="rev-actions">
          <button class="btn" id="revSave">保存</button>
          <button class="btn ghost" id="revCancel">キャンセル</button>
          <span class="rev-status" id="revStatus"></span>
        </div>
      </div>
    </div>
    <script src="product.js"></script>
    <script src="report.js"></script>
    <script src="nav.js"></script>
  </body>
</html>
