<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand">
          <span class="brand-mark"></span><span>kinbot</span>
        </div>
        <a class="side-item active" href="index.html">レコーディング</a>
        <a class="side-item" href="history.html">商談履歴</a>
        <a class="side-item" href="settings.html">設定</a>
      </nav>

      <div class="main">
        <header class="topbar">
          <div class="brand">
            <span class="brand-sub">live</span>
          </div>
          <div class="join" id="joinBar">
            <select id="linkSelect" class="link-select"><option value="">登録リンクから選ぶ…</option></select>
            <input id="meetingUrl" type="url" placeholder="会議のURL（Zoom / Meet / Teams）" />
            <input id="repName" type="text" placeholder="あなたの表示名（任意）" />
            <button class="btn" id="joinBtn">Botを入室させる</button>
          </div>
          <div class="controls" id="liveControls" hidden>
            <span class="timer" id="timer">00:00</span>
            <span class="conn" id="conn" data-state="idle" title="接続状態"></span>
            <button class="btn ghost" id="leaveBtn">退出</button>
          </div>
        </header>

        <div class="consent-strip">
          Botが参加者として入室します。<strong>相手に録音・記録の同意</strong>を得てください。
        </div>

        <main class="grid">
          <section class="panel transcript-panel">
            <div class="panel-head">
              <h2>ライブ文字起こし</h2><span class="hint" id="sttHint">待機中</span>
            </div>
            <div class="transcript" id="transcript">
              <div class="empty-state" id="transcriptEmpty">
                会議URLを入れて「Botを入室させる」を押すと、発言が話者ごとに流れます。
              </div>
            </div>
            <div class="partial" id="partial"></div>
          </section>

          <section class="panel summary-panel">
            <div class="panel-head"><h2>要約</h2><span class="hint" id="summaryHint">—</span></div>
            <div class="summary" id="summary">
              <div class="empty-state">会話が進むと、状況・要点・合意・宿題・相手の懸念を自動でまとめます。</div>
            </div>
          </section>

          <section class="panel moves-panel">
            <div class="panel-head"><h2>次の一手</h2><span class="hint">AI提案</span></div>
            <div class="moves" id="moves">
              <div class="empty-state">深掘り質問・反論への切り返し・クロージングの好機・見落としリスクを提案します。</div>
            </div>
          </section>
        </main>

        <footer class="statusbar"><span id="status">待機中</span></footer>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
