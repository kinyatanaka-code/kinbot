<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 分析</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html"><span class="side-ico ico-rec"></span><span class="side-label">レコーディング</span></a>
        <a class="side-item" href="history.html"><span class="side-ico ico-hist"></span><span class="side-label">商談履歴</span></a>
        <a class="side-item" href="deals.html"><span class="side-ico ico-deal"></span><span class="side-label">案件</span></a>
        <a class="side-item active" href="analysis.html"><span class="side-ico ico-ana"></span><span class="side-label">分析</span></a>
        <a class="side-item" href="settings.html"><span class="side-ico ico-set"></span><span class="side-label">設定</span></a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><img class="topbar-bot" src="kinbot.svg" alt="" /><span class="brand-name">分析（全商談の振り返り）</span></div></header>
        <main class="analysis-page">
          <div class="filters">
            <div class="fphase-group frep-group" id="fRepGroup"><span class="flabel">営業担当者</span></div>
            <div class="fphase-group" id="fPhaseGroup"><span class="flabel">フェーズ</span></div>
            <label>開始日
              <input type="date" id="fFrom" />
            </label>
            <label>終了日
              <input type="date" id="fTo" />
            </label>
            <button class="btn" id="fApply">絞り込み</button>
            <button class="btn ghost" id="fClear">クリア</button>
          </div>

          <div class="ana-tabs" id="anaTabs">
            <button class="ana-tab active" data-mp="dash"><span class="tico tico-dash"></span><span>ダッシュボード</span></button>
            <button class="ana-tab" data-mp="free"><span class="tico tico-free"></span><span>なんでも分析</span></button>
            <button class="ana-tab" data-mp="agg"><span class="tico tico-agg"></span><span>担当・スコア</span></button>
            <button class="ana-tab" data-mp="tend"><span class="tico tico-tend"></span><span>傾向まとめ</span></button>
            <button class="ana-tab" data-mp="win"><span class="tico tico-win"></span><span>勝ち負け・失注</span></button>
            <button class="ana-tab" data-mp="list"><span class="tico tico-list"></span><span>商談一覧</span></button>
          </div>

          <div class="dashboard" id="dashboard" data-mpanel="dash"></div>

          <div class="freebox" id="freebox" data-mpanel="free"></div>

          <div class="agg" id="agg" data-mpanel="agg"></div>

          <div class="tendency" id="tendency" data-mpanel="tend"></div>

          <div class="winloss" id="winloss" data-mpanel="win"></div>

          <div class="lostsig" id="lostsig" data-mpanel="win"></div>

          <div class="alist-wrap" data-mpanel="list">
            <div class="alist-head">
              <h3>対象の商談（クリックで詳細へ）</h3>
              <div class="hfilter-actions">
                <button class="btn" id="anaBulkNotion">絞り込みをNotionに一括送信</button>
                <span class="bulk-status" id="anaBulkStatus"></span>
              </div>
            </div>
            <ul class="alist" id="alist"><li class="empty-state">読み込み中…</li></ul>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="analysis.js"></script>
      <script src="nav.js"></script>
  </body>
</html>
