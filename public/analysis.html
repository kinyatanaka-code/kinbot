<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 分析</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html">レコーディング</a>
        <a class="side-item" href="history.html">商談履歴</a>
        <a class="side-item active" href="analysis.html">分析</a>
        <a class="side-item" href="settings.html">設定</a>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><span class="brand-name">分析（全商談の振り返り）</span></div></header>
        <main class="analysis-page">
          <div class="filters">
            <label>営業担当者
              <select id="fRep"><option value="">全員</option></select>
            </label>
            <label>開始日
              <input type="date" id="fFrom" />
            </label>
            <label>終了日
              <input type="date" id="fTo" />
            </label>
            <button class="btn" id="fApply">絞り込み</button>
            <button class="btn ghost" id="fClear">クリア</button>
          </div>

          <div class="agg" id="agg"></div>

          <div class="alist-wrap">
            <h3>対象の商談（クリックで詳細へ）</h3>
            <ul class="alist" id="alist"><li class="empty-state">読み込み中…</li></ul>
          </div>
        </main>
      </div>
    </div>
    <script src="analysis.js"></script>
  </body>
</html>
