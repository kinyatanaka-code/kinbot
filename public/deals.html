<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 案件</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html"><span class="side-ico ico-rec"></span><span class="side-label">レコーディング</span></a>
        <a class="side-item" href="history.html"><span class="side-ico ico-hist"></span><span class="side-label">商談履歴</span></a>
        <a class="side-item active" href="deals.html"><span class="side-ico ico-deal"></span><span class="side-label">案件</span></a>
        <a class="side-item" href="analysis.html"><span class="side-ico ico-ana"></span><span class="side-label">分析</span></a>
        <a class="side-item" href="settings.html"><span class="side-ico ico-set"></span><span class="side-label">設定</span></a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><img class="topbar-bot" src="kinbot.svg" alt="" /><span class="brand-name">案件</span></div></header>
        <div class="hfilters">
          <label>営業担当<select id="fOwner"><option value="">全員</option></select></label>
          <label>検索<input id="fSearch" type="text" placeholder="取引先名で検索" /></label>
          <label>商談期間<span class="range"><input id="fFrom" type="date" /><span class="range-sep">〜</span><input id="fTo" type="date" /></span></label>
          <button class="btn ghost" id="mergeDupBtn" type="button" title="同じ会社名の案件を1つにまとめます">重複をまとめる</button>
          <button class="btn ghost" id="phaseBackfillBtn" type="button" title="まだフェーズ判定していない案件をまとめて判定します">未判定をまとめて判定</button>
          <button class="btn ghost" id="phaseRejudgeAllBtn" type="button" title="既に判定済みの案件も含め、全件を最新の基準で判定し直します">全件を再判定</button>
          <span class="merge-status" id="mergeStatus"></span>
          <span class="merge-status" id="phaseBackfillStatus"></span>
        </div>
        <main class="history">
          <aside class="hlist" id="dealList"><div class="empty-state">読み込み中…</div></aside>
          <section class="hdetail" id="dealDetail">
            <div class="empty-state empty-bot"><img src="kinbot.svg" alt="kinbot" /><div>左の一覧から案件を選ぶと、商談の流れ・やること・相手の懸念をまとめて表示します。</div></div>
          </section>
        </main>
      </div>
    </div>
    <script src="deals.js"></script>
    <script src="nav.js"></script>
  </body>
</html>
