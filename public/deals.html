<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 案件</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html">レコーディング</a>
        <a class="side-item" href="history.html">商談履歴</a>
        <a class="side-item active" href="deals.html">案件</a>
        <a class="side-item" href="analysis.html">分析</a>
        <a class="side-item" href="settings.html">設定</a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><img class="topbar-bot" src="kinbot.svg" alt="" /><span class="brand-name">案件</span></div></header>
        <div class="hfilters">
          <label>営業担当<select id="fOwner"><option value="">全員</option></select></label>
          <label>検索<input id="fSearch" type="text" placeholder="取引先名で絞り込み" /></label>
        </div>
        <main class="history">
          <aside class="hlist" id="dealList"><div class="empty-state">読み込み中…</div></aside>
          <section class="hdetail" id="dealDetail">
            <div class="empty-state empty-bot"><img src="kinbot.svg" alt="kinbot" /><div>左の一覧から案件を選ぶと、商談の流れ・やること・相手の懸念をまとめて表示します。</div></div>
          </section>
        </main>
      </div>
    </div>
    <script src="deals.js"></script>
    <script src="nav.js"></script>
  </body>
</html>
