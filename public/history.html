<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 履歴</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html"><span class="side-ico ico-rec"></span><span class="side-label">レコーディング</span></a>
        <a class="side-item active" href="history.html"><span class="side-ico ico-hist"></span><span class="side-label">商談履歴</span></a>
        <a class="side-item" href="deals.html"><span class="side-ico ico-deal"></span><span class="side-label">案件</span></a>
        <a class="side-item" href="report.html"><span class="side-ico ico-ana"></span><span class="side-label">実績</span></a>
        <a class="side-item" href="style-analysis.html"><span class="side-ico ico-ana"></span><span class="side-label">営業スタイル分析</span></a>
        <a class="side-item" href="dashboard.html"><span class="side-ico ico-ana"></span><span class="side-label">ダッシュボード</span></a>
        <a class="side-item" href="proposals.html"><span class="side-ico ico-deal"></span><span class="side-label">提案資料</span></a>
        <a class="side-item" href="apo.html"><span class="side-ico ico-apo"></span><span class="side-label">アポ振り分け</span></a>
        <a class="side-item" href="settings.html"><span class="side-ico ico-set"></span><span class="side-label">設定</span></a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><img class="topbar-bot" src="kinbot.svg" alt="" /><span class="brand-name">商談履歴</span></div></header>
        <div class="hist-cat-tabs" id="histCatTabs">
          <button class="hist-cat-tab active" data-cat="sales"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align:-2px;margin-right:4px"><rect x="1" y="6" width="4" height="9" rx="1" fill="#0d5b47"/><rect x="6" y="3" width="4" height="12" rx="1" fill="#1d9e75"/><rect x="11" y="1" width="4" height="14" rx="1" fill="#5DCAA5"/></svg>商談</button>
          <button class="hist-cat-tab" data-cat="follow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align:-2px;margin-right:4px"><circle cx="8" cy="5" r="3.5" fill="#0d5b47"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#0d5b47" stroke-width="1.5" fill="none"/><path d="M11 4l2 2 3-4" stroke="#1d9e75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>ユーザーフォロー</button>
          <button class="hist-cat-tab" data-cat="internal"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align:-2px;margin-right:4px"><rect x="3" y="4" width="10" height="11" rx="1.5" fill="#0d5b47"/><rect x="5" y="1" width="6" height="4" rx="1" fill="#1d9e75"/><rect x="5.5" y="7" width="5" height="1" rx=".5" fill="#fff"/><rect x="5.5" y="9.5" width="5" height="1" rx=".5" fill="#fff"/><rect x="5.5" y="12" width="3" height="1" rx=".5" fill="#fff"/></svg>社内MTG</button>
        </div>
        <div class="hfilters">
          <label>営業担当<select id="fOwner"><option value="">全員</option></select></label>
          <label class="hsearch">商談名<input type="search" id="fName" placeholder="会社名・担当者名で検索" autocomplete="off" /></label>
          <label class="hdate">商談日<input type="date" id="fDateFrom" /></label>
          <span class="hdate-sep">〜</span>
          <label class="hdate"><input type="date" id="fDateTo" /></label>
          <button class="btn ghost hsearch-clear" id="fClear" type="button">クリア</button>
          <div class="hfilter-actions">
            <button class="btn" id="bulkNotionBtn">絞り込みをNotionに一括送信</button>
            <span class="bulk-status" id="bulkNotionStatus"></span>
          </div>
        </div>
        <main class="history">
          <aside class="hlist" id="hlist"><div class="empty-state">読み込み中…</div></aside>
          <section class="hdetail" id="hdetail">
            <div class="empty-state empty-bot"><img src="kinbot.svg" alt="kinbot" /><div>左の一覧から商談を選ぶと、録画・文字起こし・要約・分析を表示します。</div></div>
          </section>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="product.js"></script>
    <script src="history.js"></script>
      <script src="nav.js"></script>
  </body>
</html>
