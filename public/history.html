<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot 履歴</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="side-brand"><span class="brand-mark"></span><span>kinbot</span></div>
        <a class="side-item" href="index.html">レコーディング</a>
        <a class="side-item active" href="history.html">商談履歴</a>
        <a class="side-item" href="analysis.html">分析</a>
        <a class="side-item" href="settings.html">設定</a>
        <div class="side-foot"><span id="who" class="who"></span><a href="#" id="logout" class="side-logout">ログアウト</a></div>
      </nav>

      <div class="main">
        <header class="topbar"><div class="brand"><span class="brand-name">商談履歴</span></div></header>
        <div class="hfilters">
          <label>営業担当<select id="fOwner"><option value="">全員</option></select></label>
          <label>フェーズ<select id="fPhase"><option value="">すべて</option></select></label>
        </div>
        <main class="history">
          <aside class="hlist" id="hlist"><div class="empty-state">読み込み中…</div></aside>
          <section class="hdetail" id="hdetail">
            <div class="empty-state">左の一覧から商談を選ぶと、録画・文字起こし・要約・分析を表示します。</div>
          </section>
        </main>
      </div>
    </div>
    <script src="history.js"></script>
      <script src="nav.js"></script>
  </body>
</html>
