<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinbot ログイン</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <img class="auth-mascot" src="kinbot.svg" alt="kinbot" />
        <div class="login-brand"><span class="brand-mark"></span> kinbot</div>
        <p class="login-sub">ログイン</p>
        <label class="field"><span>メールアドレス</span><input id="email" type="email" autocomplete="email" /></label>
        <label class="field"><span>パスワード</span><input id="p" type="password" autocomplete="current-password" /></label>
        <button class="btn" id="loginBtn">ログイン</button>
        <p class="login-err" id="err" hidden></p>
        <p class="login-alt">アカウントがない方は <a href="register.html">新規登録</a></p>
      </div>
    </div>
    <script>
      const $ = (id) => document.getElementById(id);
      async function login() {
        $("err").hidden = true;
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ email: $("email").value.trim(), password: $("p").value }),
          });
          if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            throw new Error(d.error || "ログインに失敗しました");
          }
          location.href = "/";
        } catch (e) {
          $("err").textContent = e.message;
          $("err").hidden = false;
        }
      }
      $("loginBtn").addEventListener("click", login);
      $("p").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    </script>
  </body>
</html>
